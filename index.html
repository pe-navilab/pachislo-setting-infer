<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>パチスロ設定推測ツール（Web版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1976d2">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Yu Gothic", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    select, input, button {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled {
      background: #aaa;
      cursor: default;
    }
    .result {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    canvas {
      margin-top: 16px;
    }

    /* ▼ ローディング表示 */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      line-height: 1.6;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>
<body>

  <!-- ▼ ローディング表示（OCR中に表示される） -->
  <div id="loadingOverlay">
    読み取り中…<br>しばらくお待ちください
  </div>

  <div class="container">
    <h1>パチスロ設定推測ツール</h1>

    <label for="machineSelect">機種を選択</label>
    <select id="machineSelect">
      <option value="">読み込み中...</option>
    </select>

    <label for="gamesInput">総ゲーム数</label>
    <input id="gamesInput" type="number" min="0" placeholder="例：1000">

    <label for="bigInput">BIG回数</label>
    <input id="bigInput" type="number" min="0" placeholder="例：12">

    <label for="regInput">REG回数</label>
    <input id="regInput" type="number" min="0" placeholder="例：4">

    <!-- ギャラリーから選択 -->
    <label for="photoInput">写真から読み取る（ギャラリー）</label>
    <input id="photoInput" type="file" accept="image/*">

    <!-- カメラ起動 -->
    <label for="cameraInput">スマホカメラで撮影して読み取る</label>
    <input id="cameraInput" type="file" accept="image/*" capture="environment">

    <!-- ★ 画像読み取りボタン（再読み取り用） -->
    <button id="readImageButton">画像を読み取る</button>

    <button id="inferButton" disabled>推測する</button>

    <div class="result" id="resultArea"></div>

    <canvas id="chartCanvas"></canvas>
  </div>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
