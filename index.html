<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パチスロ設定推測ツール</title>

  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ▼ 中央揃えレイアウト -->
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      font-family: sans-serif;
      padding: 10px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, button {
      margin-top: 6px;
      font-size: 16px;
    }

    #chartCanvas {
      margin-top: 20px;
    }

    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 24px;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>

<body>

<h2>パチスロ設定推測ツール</h2>

<!-- ▼ 機種選択 -->
<label>機種選択：</label>
<select id="machineSelect"></select>

<!-- ▼ 入力欄 -->
<label>総回転：</label>
<input id="gamesInput" type="number">

<label>BIG：</label>
<input id="bigInput" type="number">

<label>REG：</label>
<input id="regInput" type="number">

<hr>

<!-- ▼ 画像読み取り -->
<label for="photoInput">画像を選択して読み取る</label>
<input id="photoInput" type="file" accept="image/*">

<label for="cameraInput">スマホカメラで撮影して読み取る</label>
<input id="cameraInput" type="file" accept="image/*" capture="environment">

<button id="readImageButton">画像を読み取る</button>
<button id="inferButton" disabled>推測する</button>

<!-- ▼ ローディング -->
<div id="loadingOverlay">読み取り中...</div>

<!-- ▼ 結果 -->
<div class="result" id="resultArea"></div>
<canvas id="chartCanvas"></canvas>

<!-- ▼ PaddleOCR.js（新SDK） -->
<script type="module" src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
