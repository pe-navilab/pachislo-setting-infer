<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パチスロ設定推測ツール</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>パチスロ設定推測ツール</h2>

<div>
  <label>機種選択：</label>
  <select id="machineSelect"></select>
</div>

<div>
  <label>総回転：</label>
  <input id="gamesInput" type="number">
</div>

<div>
  <label>BIG：</label>
  <input id="bigInput" type="number">
</div>

<div>
  <label>REG：</label>
  <input id="regInput" type="number">
</div>

<hr>

<label for="photoInput">画像を選択して読み取る</label>
<input id="photoInput" type="file" accept="image/*">

<label for="cameraInput">スマホカメラで撮影して読み取る</label>
<input id="cameraInput" type="file" accept="image/*" capture="environment">

<button id="readImageButton">画像を読み取る</button>
<button id="inferButton" disabled>推測する</button>

<div id="loadingOverlay" style="
  display:none;
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  color:white; font-size:24px;
  justify-content:center; align-items:center;
">読み取り中...</div>

<div class="result" id="resultArea"></div>
<canvas id="chartCanvas"></canvas>

<!-- ▼ ここが最重要：正しい script 読み込み -->
<script type="module" src="script_v2.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
